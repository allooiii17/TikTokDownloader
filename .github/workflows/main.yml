name: Build iOS Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot build-essential perl libssl-dev curl

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Setup Toolchain (المترجم المفقود)
        run: |
          mkdir -p $HOME/theos/toolchain/linux/iphone
          curl -LO https://github.com/theos/toolchain/releases/download/v2.5/linux-arm64-toolchain.tar.lzma
          tar -xvf linux-arm64-toolchain.tar.lzma -C $HOME/theos/toolchain/linux/iphone --strip-components=1
          rm linux-arm64-toolchain.tar.lzma

      - name: Setup SDK
        run: |
          rm -rf $HOME/theos/sdks
          git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Build Package
        run: |
          export THEOS=$HOME/theos
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TikTokTweak-Dylib
          path: .theos/obj/debug/*.dylib



