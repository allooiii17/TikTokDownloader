name: Build iOS Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos and Build Tweak
        uses: gh-actions-apple/theos-action@v1
        with:
          theos-src: 'https://github.com/theos/theos.git'
          sdk-url: 'https://github.com/theos/sdks.git'
          build-cmd: 'make package FINALPACKAGE=1'

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TikTokTweak-Dylib
          path: .theos/obj/debug/*.dylib







