name: Build iOS Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot build-essential perl libssl-dev curl wget

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Setup Toolchain & SDK
        run: |
          # تحميل الـ Toolchain المخصص للينكس من مستودع موثوق وموجود فعلياً
          mkdir -p $HOME/theos/toolchain/linux/iphone
          wget https://github.com/kabiroberai/theos-toolchain-linux/releases/download/v1.0.0/toolchain-linux-arm64.tar.gz
          tar -zxvf toolchain-linux-arm64.tar.gz -C $HOME/theos/toolchain/linux/iphone --strip-components=1
          rm toolchain-linux-arm64.tar.gz

          # تحميل الـ SDKs
          rm -rf $HOME/theos/sdks
          git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Build Package
        run: |
          export THEOS=$HOME/theos
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TikTokTweak-Dylib
          path: .theos/obj/debug/*.dylib






